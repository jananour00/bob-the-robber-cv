<html lang="en">

<head>
  <title>Bob the Robber 2</title>
  <script src="/js/all.js"></script>

  <meta id="viewport" name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui, shrink-to-fit=no" />
  <link rel="stylesheet" href="assets/css/app.css" type="text/css" />
  <link rel="stylesheet" href="ui-theme.css?v=4" type="text/css" />
  <style>
    /* Override injected JS styles from the game branding and canvas */
    html,
    body {
      background: #0b0c10 !important;
      background-image: none !important;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #h5branding-container,
    #h5branding-background {
      display: none !important;
    }

    canvas {
      background: transparent !important;
      background-color: transparent !important;
      background-image: none !important;
    }

    /* Custom UI Styles - Premium Dark Artistic */
    #my-custom-ui {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
      text-align: center;
      background: #1f2833;
      padding: 50px 60px;
      color: #c5c6c7;
      border: 1px solid #323d4a;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      border-radius: 0px;
      /* Brutalist sharp edges */
      min-width: 450px;
    }

    #my-custom-ui h1 {
      font-size: 34px;
      font-weight: 800;
      margin: 0 0 15px 0;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #66fcf1;
    }

    #my-custom-ui p {
      font-size: 16px;
      color: #c5c6c7;
      margin: 0 0 45px 0;
      line-height: 1.6;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    #my-custom-play-btn {
      background: #45a29e;
      color: #0b0c10;
      border: none;
      padding: 18px 45px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 0px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 6px 6px 0 #66fcf1;
      /* Solid shadow, NO gradients */
    }

    #my-custom-play-btn:hover {
      background: #66fcf1;
      transform: translate(-2px, -2px);
      box-shadow: 8px 8px 0 #45a29e;
    }

    #my-custom-play-btn:active {
      transform: translate(6px, 6px);
      box-shadow: 0px 0px 0 #45a29e;
    }
  </style>
</head>

<body>
  <!-- YOUR CUSTOM UI GOES HERE -->
  <div id="my-custom-ui">
    <h1>KineticLink : Parkinson Bio-Tracker</h1>
    <p>Turn your hand movements into Inputs using AI.</p>
    <button id="my-custom-play-btn" onclick="startMyGame()">LAUNCH PROJECT</button>
  </div>

  <script>
    // Function to start the game and hide the custom UI
    function startMyGame() {
      var ui = document.getElementById("my-custom-ui");
      ui.style.display = "none";

      // This triggers the internal game loader
      if (window.h5branding && window.h5branding.SplashLoader) {
        h5branding.SplashLoader.getInstance().onPlayButtonClick();
      } else {
        // Fallback if branding hasn't loaded yet
        setTimeout(startMyGame, 200);
      }

      // Start monitoring for game completion
      setTimeout(monitorGameCompletion, 5000);
    }

    // Monitor for game completion and show dashboard
    function monitorGameCompletion() {
      const checkInterval = setInterval(() => {
        try {
          // Check if Phaser game exists
          if (window.Phaser && Phaser.GAMES && Phaser.GAMES.length > 0) {
            const game = Phaser.GAMES[0];

            // Check for win/lose conditions in the game state
            if (game.state && game.state.getCurrentState) {
              const currentState = game.state.getCurrentState();

              // Look for common win/lose indicators
              if (currentState) {
                // Check for game over screens, win screens, or completion states
                const stateName = currentState.key || currentState.constructor.name;

                // Common game completion indicators
                const completionIndicators = [
                  'GameOver', 'Win', 'Complete', 'Victory', 'Success',
                  'LevelComplete', 'MissionComplete', 'Finished'
                ];

                const isCompleted = completionIndicators.some(indicator =>
                  stateName.toLowerCase().includes(indicator.toLowerCase())
                );

                // Also check for specific UI elements that might indicate completion
                const gameOverElements = document.querySelectorAll('*[class*="gameover"], *[class*="win"], *[class*="complete"], *[id*="gameover"], *[id*="win"]');
                const hasCompletionUI = gameOverElements.length > 0;

                // Check for "You Win" or "Game Over" text in the DOM
                const bodyText = document.body.textContent || document.body.innerText;
                const hasWinText = /\b(you win|game over|level complete|mission accomplished|victory)\b/i.test(bodyText);

                if (isCompleted || hasCompletionUI || hasWinText) {
                  clearInterval(checkInterval);
                  showCompletionDashboard();
                  return;
                }
              }
            }
          }
        } catch (e) {
          // Ignore errors during monitoring
        }
      }, 2000); // Check every 2 seconds

      // Stop monitoring after 2 hours (safety timeout)
      setTimeout(() => {
        clearInterval(checkInterval);
      }, 2 * 60 * 60 * 1000);
    }

    // Show the completion dashboard
    function showCompletionDashboard() {
      // Create overlay for dashboard
      const overlay = document.createElement('div');
      overlay.id = 'completion-overlay';
      overlay.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(5px);
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.5s ease;
      `;

      const modal = document.createElement('div');
      modal.style.cssText = `
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 20px;
        padding: 40px;
        max-width: 600px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        animation: slideUp 0.5s ease;
      `;

      modal.innerHTML = `
        <h1 style="color: white; font-size: 2.5rem; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">
          🎉 Session Complete!
        </h1>
        <p style="color: rgba(255,255,255,0.9); font-size: 1.2rem; margin-bottom: 30px; line-height: 1.6;">
          Great job! Your motion performance data has been recorded.<br>
          View your detailed analytics and progress tracking.
        </p>
        <div style="display: flex; gap: 20px; justify-content: center;">
          <button id="view-dashboard-btn" style="
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
          ">📊 View Dashboard</button>
          <button id="close-modal-btn" style="
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
          ">Continue Playing</button>
        </div>
      `;

      overlay.appendChild(modal);
      document.body.appendChild(overlay);

      // Add CSS animations
      const style = document.createElement('style');
      style.textContent = `
        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }
        @keyframes slideUp {
          from { transform: translateY(50px); opacity: 0; }
          to { transform: translateY(0); opacity: 1; }
        }
        #view-dashboard-btn:hover {
          transform: translateY(-2px);
          box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }
        #close-modal-btn:hover {
          background: rgba(255,255,255,0.3);
          transform: translateY(-2px);
        }
      `;
      document.head.appendChild(style);

      // Button event listeners
      document.getElementById('view-dashboard-btn').onclick = () => {
        window.open('dashboard.html', '_blank');
        overlay.remove();
      };

      document.getElementById('close-modal-btn').onclick = () => {
        overlay.remove();
      };

      // Auto-show dashboard after 10 seconds if no interaction
      setTimeout(() => {
        if (document.getElementById('completion-overlay')) {
          window.open('dashboard.html', '_blank');
          overlay.remove();
        }
      }, 10000);
    }
  </script>


  <div id="content"></div>
  <footer class="app-footer">
    <span>Tip: connect Python MediaPipe for gesture control. | <a href="dashboard.html" style="color: #66fcf1;">View Performance Dashboard</a></span>
  </footer>

  <div id="orientation"></div>
  <div id="loader">Loading...</div>
  <script src="cv-controls.js"></script>

  <script type="text/javascript">
    var gameName = "bob-the-robber-2.min.f.js";

    //This all here is for cache busting;
    function addScript(src, buster, callback) {
      var s = document.createElement("script");
      s.setAttribute("src", src + "?v=" + buster);
      if (typeof callback === "function") {
        s.onload = callback;
      }
      document.body.appendChild(s);
    }

    window.addEventListener(
      "touchmove",
      function (event) {
        event.preventDefault();
      },
      false
    );
    if (typeof window.devicePixelRatio != "undefined" && window.devicePixelRatio > 2) {
      var meta = document.getElementById("viewport");
      meta.setAttribute("content", "width=device-width, initial-scale=" + 2 / window.devicePixelRatio + ", user-scalable=no");
    }

    addScript("version.js", Date.now(), function () {
      addScript(gameName, version, function () {
        var game = new Game();
      });
    });
  </script>
  <script id="game-hacks">
    // ==========================================
    // GAME LOGIC OVERRIDES (Monkey-Patching)
    // ==========================================
    // You can safely change these variables to control the game!

    const HACKS = {
      cameraSpeedX: 0.05,  // Very slow tracking to see it working (1 = instant lock, 0.05 = laggy)
      cameraSpeedY: 0.05,
      disableAlarms: true, // Set to true to disable security cameras / alarms completely
      freezeGuards: true, // Set to true to freeze all enemies
    };

    // This loop runs continuously to enforce your hacks
    setInterval(function () {
      // Check if Phaser and the game instance have loaded
      if (window.Phaser && Phaser.GAMES && Phaser.GAMES.length > 0) {
        var game = Phaser.GAMES[0];

        // 1. CONTROL CAMERA SPEED
        try {
          if (game.camera && game.camera.lerp) {
            // The game uses a custom W.Point class which uses .set() instead of .setTo()
            if (typeof game.camera.lerp.set === 'function') {
              game.camera.lerp.set(HACKS.cameraSpeedX, HACKS.cameraSpeedY);
            } else {
              game.camera.lerp.x = HACKS.cameraSpeedX;
              game.camera.lerp.y = HACKS.cameraSpeedY;
            }
          }
        } catch (e) { console.error("Camera hack error", e); }

        // 2. CONTROL ALARMS AND ENEMIES via Custom Game State
        try {
          if (game.state) {
            var currentState = game.state.getCurrentState();

            if (currentState) {

              // Disable Alarms globally by instantly resetting the "alert" state back to normal
              if (HACKS.disableAlarms && currentState.gameStatus) {
                if (currentState.gameStatus === "alert" || currentState.gameStatus === "warning") {
                  currentState.gameStatus = "normal";
                  currentState.totalAlerts = 0; // Prevent losing the game
                }
              }

              // Freeze Guards by iterating through the game's custom 'enemies' array
              if (HACKS.freezeGuards && currentState.enemies && Array.isArray(currentState.enemies)) {
                for (var i = 0; i < currentState.enemies.length; i++) {
                  var enemy = currentState.enemies[i];

                  enemy.enemyAction = "stun"; // Force their internal logic into stunned mode

                  if (enemy.enemyClip) {
                    // We can also completely hide them so they are invisible
                    enemy.enemyClip.visible = false;
                    enemy.enemyClip.x = -9999;
                  }
                }
              }

              // Do the same for 'zombies' if the level has them
              if (HACKS.freezeGuards && currentState.zombies && Array.isArray(currentState.zombies)) {
                for (var i = 0; i < currentState.zombies.length; i++) {
                  var zombie = currentState.zombies[i];
                  zombie.zombieStatus = "stun";
                  if (zombie.enemyClip) {
                    zombie.enemyClip.visible = false;
                    zombie.enemyClip.x = -9999;
                  }
                }
              }
            }
          }
        }
    }, 100); // Runs 10 times per second
  </script>
</body>

</html>
